name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Validate signing key secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty"
            exit 1
          fi
          key="$TAURI_SIGNING_PRIVATE_KEY"
          if echo "$key" | grep -qi "encrypted secret key"; then
            echo "Signing key: raw format"
          elif printf '%s' "$key" | tr -d '\n\r ' | base64 -d 2>/dev/null | grep -qi "encrypted secret key"; then
            echo "Signing key: base64-encoded format"
          else
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks invalid. Paste ~/.tauri/easyzapret-updater.key as-is (see docs/UPDATER_SETUP.md)."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --verbose

      - name: List bundle artifacts
        shell: bash
        run: |
          ls -la src-tauri/target/release/bundle/nsis/ || ls -laR src-tauri/target/release/bundle/

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EasyZapret ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/latest.json
