name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Validate signing key secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty"
            exit 1
          fi
          key="$TAURI_SIGNING_PRIVATE_KEY"
          if echo "$key" | grep -qi "encrypted secret key"; then
            echo "Signing key: raw format"
          elif printf '%s' "$key" | tr -d '\n\r ' | base64 -d 2>/dev/null | grep -qi "encrypted secret key"; then
            echo "Signing key: base64-encoded format"
          else
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks invalid. Paste ~/.tauri/easyzapret-updater.key as-is (see docs/UPDATER_SETUP.md)."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          key="$(trim "$TAURI_SIGNING_PRIVATE_KEY")"
          # Single-line base64 keys must not keep accidental newlines from paste.
          if ! echo "$key" | grep -q "encrypted secret key"; then
            key="$(printf '%s' "$key" | tr -d '\n')"
          fi
          pass="$(trim "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD")"
          if [ -z "$pass" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty"
            exit 1
          fi
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__SIGNING_KEY_EOF__"
            echo "$key"
            echo "__SIGNING_KEY_EOF__"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$pass"
          } >> "$GITHUB_ENV"

      - name: Test updater signing key
        shell: bash
        run: |
          set -e
          echo smoke > smoke.txt
          npx tauri signer sign smoke.txt
          rm -f smoke.txt smoke.txt.sig

      - name: Cargo build (release)
        working-directory: src-tauri
        run: cargo build --release

      - name: Build Tauri app
        shell: bash
        env:
          RUST_BACKTRACE: 1
        run: |
          set -o pipefail
          npm run tauri build -- --verbose 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: build.log
          if-no-files-found: ignore

      - name: Print build log tail on failure
        if: failure()
        shell: bash
        run: |
          echo "===== last 120 lines of build.log ====="
          tail -n 120 build.log || true

      - name: List bundle artifacts
        shell: bash
        run: |
          ls -la src-tauri/target/release/bundle/nsis/ || ls -laR src-tauri/target/release/bundle/

      - name: Generate latest.json
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          EXE=$(ls "$BUNDLE_DIR"/*-setup.exe | head -1)
          SIG=$(ls "$BUNDLE_DIR"/*-setup.exe.sig | head -1)
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          EXE_NAME=$(basename "$EXE")
          SIG_CONTENT=$(tr -d '\n\r' < "$SIG")
          URL="https://github.com/danyalacio/easyzapret/releases/download/${RELEASE_TAG}/${EXE_NAME}"
          export VERSION SIG_CONTENT URL RELEASE_TAG
          node <<'NODE'
          const fs = require("fs");
          const manifest = {
            version: process.env.VERSION,
            notes: `EasyZapret ${process.env.RELEASE_TAG}`,
            pub_date: new Date().toISOString(),
            platforms: {
              "windows-x86_64": {
                signature: process.env.SIG_CONTENT,
                url: process.env.URL,
              },
            },
          };
          fs.writeFileSync(
            "src-tauri/target/release/bundle/nsis/latest.json",
            JSON.stringify(manifest, null, 2),
          );
          NODE
          cat src-tauri/target/release/bundle/nsis/latest.json

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EasyZapret ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
